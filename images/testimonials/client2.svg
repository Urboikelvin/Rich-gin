<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03214a"/>
      <stop offset="100%" stop-color="#1560bd"/>
    </linearGradient>
    <clipPath id="circ2"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circ2)">
    <rect width="200" height="200" fill="url(#bg2)"/>
    <!-- shoulders / shirt -->
    <path d="M26 200 C26 148 60 128 100 128 C140 128 174 148 174 200 Z" fill="#f3f8fd"/>
    <!-- collar -->
    <path d="M82 130 L100 150 L118 130 L108 128 L100 138 L92 128 Z" fill="#0a3872"/>
    <!-- tie -->
    <path d="M96 138 L104 138 L108 168 L100 178 L92 168 Z" fill="#00c2e0"/>
    <!-- neck -->
    <rect x="86" y="110" width="28" height="32" rx="10" fill="#6b4226"/>
    <!-- head -->
    <ellipse cx="100" cy="88" rx="38" ry="42" fill="#6b4226"/>
    <!-- short hair -->
    <path d="M62 78 C60 48 78 32 100 32 C122 32 140 48 138 78 C132 60 118 50 100 50 C82 50 68 60 62 78 Z" fill="#141414"/>
    <path d="M62 78 q3 -6 6 -2 q-2 8 -4 14 q-4 -4 -2 -12" fill="#141414"/>
    <path d="M138 78 q-3 -6 -6 -2 q2 8 4 14 q4 -4 2 -12" fill="#141414"/>
    <!-- ears -->
    <ellipse cx="63" cy="92" rx="5" ry="8" fill="#6b4226"/>
    <ellipse cx="137" cy="92" rx="5" ry="8" fill="#6b4226"/>
    <!-- face -->
    <ellipse cx="100" cy="92" rx="30" ry="34" fill="#6b4226"/>
    <!-- eyes -->
    <ellipse cx="87" cy="90" rx="3.6" ry="4.4" fill="#1a1a1a"/>
    <ellipse cx="113" cy="90" rx="3.6" ry="4.4" fill="#1a1a1a"/>
    <!-- eyebrows -->
    <path d="M80 80 q7 -3 13 0" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M107 80 q7 -3 13 0" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M99 94 q-3 7 0 10 q4 3 8 0" stroke="#402b18" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- mouth -->
    <path d="M86 112 q14 8 28 0" stroke="#2a1a0e" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- light beard shading -->
    <path d="M74 106 q26 22 52 0 q-2 14 -26 18 q-24 -4 -26 -18 Z" fill="#141414" opacity=".22"/>
  </g>
</svg>
