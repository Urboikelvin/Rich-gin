<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1560bd"/>
      <stop offset="100%" stop-color="#00c2e0"/>
    </linearGradient>
    <clipPath id="circ1"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circ1)">
    <rect width="200" height="200" fill="url(#bg1)"/>
    <!-- shoulders / blouse -->
    <path d="M30 200 C30 150 62 132 100 132 C138 132 170 150 170 200 Z" fill="#eaf4fd"/>
    <path d="M30 200 C30 150 62 132 100 132 C138 132 170 150 170 200 Z" fill="#ffffff" opacity=".18"/>
    <!-- neck -->
    <rect x="86" y="112" width="28" height="34" rx="10" fill="#7a4a2b"/>
    <!-- head -->
    <ellipse cx="100" cy="90" rx="40" ry="44" fill="#8a5a34"/>
    <!-- natural curly afro hair -->
    <g fill="#141414">
      <circle cx="60" cy="70" r="16"/>
      <circle cx="55" cy="90" r="15"/>
      <circle cx="60" cy="110" r="12"/>
      <circle cx="140" cy="70" r="16"/>
      <circle cx="145" cy="90" r="15"/>
      <circle cx="140" cy="110" r="12"/>
      <circle cx="75" cy="50" r="17"/>
      <circle cx="100" cy="44" r="19"/>
      <circle cx="125" cy="50" r="17"/>
      <circle cx="88" cy="55" r="14"/>
      <circle cx="112" cy="55" r="14"/>
    </g>
    <!-- face -->
    <ellipse cx="100" cy="94" rx="32" ry="36" fill="#8a5a34"/>
    <!-- eyes -->
    <ellipse cx="86" cy="92" rx="4" ry="5" fill="#1a1a1a"/>
    <ellipse cx="114" cy="92" rx="4" ry="5" fill="#1a1a1a"/>
    <!-- eyebrows -->
    <path d="M79 82 q7 -4 14 0" stroke="#1a1a1a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M107 82 q7 -4 14 0" stroke="#1a1a1a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M99 96 q-3 8 0 12 q4 3 8 0" stroke="#5e3a20" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M85 116 q15 12 30 0" stroke="#3a2213" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <!-- earrings -->
    <circle cx="63" cy="104" r="3" fill="#c8a84b"/>
    <circle cx="137" cy="104" r="3" fill="#c8a84b"/>
  </g>
</svg>
